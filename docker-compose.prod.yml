name: siscont_prod

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.prod
    restart: always

  web:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - ./secrets/credentials.json:/app/credentials.json:ro
      - ./secrets/token.json:/app/token.json
      - ./backups:/backups
    env_file: .env.prod
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/credentials.json
      - GMAIL_TOKEN_PATH=/app/token.json
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/login/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cron:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/credentials.json
      - GMAIL_TOKEN_PATH=/app/token.json
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      - db
    restart: always
    volumes:
      - ./crontab.prod:/etc/cron.d/app_contratos
      - ./secrets/credentials.json:/app/credentials.json:ro
      - ./secrets/token.json:/app/token.json
      - ./backups:/backups
    entrypoint: sh -c "printenv >> /etc/environment && chmod 0644 /etc/cron.d/app_contratos && cron -f"

volumes:
  postgres_data:
    name: siscont_pg_data_prod
  static_volume:
    name: siscont_static_prod
  media_volume:
    name: siscont_media_prod
