services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.prod
    restart: always

  web:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - static_volume:/app/staticfiles
    env_file: .env.prod
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - web
    restart: always

  cron:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    depends_on:
      - db
    restart: always
    volumes:
      - ./crontab.prod:/etc/cron.d/app_contratos
    entrypoint: sh -c "chmod 0644 /etc/cron.d/app_contratos && cron -f"

volumes:
  postgres_data:
  static_volume:
