services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.prod
    restart: always

  web:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - ./secrets/credentials.json:/app/credentials.json:ro
      - ./secrets/token.json:/app/token.json
    env_file: .env.prod
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/credentials.json
      - GMAIL_TOKEN_PATH=/app/token.json
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      - web
    restart: always

  cron:
    image: app_contratos-web:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/credentials.json
      - GMAIL_TOKEN_PATH=/app/token.json
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      - db
    restart: always
    volumes:
      - ./crontab.prod:/etc/cron.d/app_contratos
      - ./secrets/credentials.json:/app/credentials.json:ro
      - ./secrets/token.json:/app/token.json
    entrypoint: sh -c "chmod 0644 /etc/cron.d/app_contratos && cron -f"

volumes:
  postgres_data:
  static_volume:
  media_volume:
