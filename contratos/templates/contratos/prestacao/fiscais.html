{% extends 'contratos/prestacao/base_prestacao_publica.html' %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white p-4 rounded-top-4">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-ruled me-2"></i> Prestação de Contas: Fiscais</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Selecione o contrato para o qual deseja realizar a entrega ou consultar o histórico.</p>
                    
                    <div class="mb-4">
                        <label for="contrato_select" class="form-label fw-bold">Buscar Contrato:</label>
                        <select id="contrato_select" class="form-select form-select-lg">
                            <option value="">Digite o número ou empresa...</option>
                            {% for c in contratos %}
                            <option value="{{ c.id }}">{{ c.numero }} - {{ c.empresa.razao_social }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'portal_prestacao_index' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
                        <button id="btn_prosseguir" class="btn btn-primary fw-bold" disabled>Prosseguir <i class="bi bi-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    $('#contrato_select').select2({
        theme: 'bootstrap-5',
        width: '100%'
    }).on('change', function() {
        if($(this).val()) {
            $('#btn_prosseguir').prop('disabled', false);
        } else {
            $('#btn_prosseguir').prop('disabled', true);
        }
    });

    $('#btn_prosseguir').click(function() {
        var cid = $('#contrato_select').val();
        if(cid) {
            window.location.href = '/prestacoes/fiscais/' + cid + '/';
        }
    });
});
</script>
{% endblock %}
