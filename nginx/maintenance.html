<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISCONT — Sistema em Manutenção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.2);
            --border: rgba(148, 163, 184, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, var(--accent-glow) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, var(--amber-glow) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, 3%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 560px;
            width: 100%;
        }

        /* Animated icon */
        .icon-wrapper {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .icon-wrapper svg {
            width: 48px;
            height: 48px;
            color: var(--amber);
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Info card */
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
        }

        .info-card .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .info-card .detail {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0;
        }

        .info-card .detail:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        .info-card .detail .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.pulse {
            background: var(--amber);
            box-shadow: 0 0 0 0 var(--amber-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        .dot.blue {
            background: var(--accent);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50%      { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
        }

        .info-card .detail span {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .footer .system-name {
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* Responsiveness */
        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.4rem; }
            .icon-wrapper { width: 72px; height: 72px; border-radius: 18px; }
            .icon-wrapper svg { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <!-- Gear SVG icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
        </div>

        <h1>Sistema em Manutenção</h1>
        <p class="subtitle">
            Estamos realizando melhorias para garantir o melhor funcionamento do sistema.
            O acesso será restabelecido em breve.
        </p>

        <div class="info-card">
            <div class="label">Informações</div>
            <div class="detail">
                <div class="dot pulse"></div>
                <span>Manutenção programada em andamento</span>
            </div>
            <div class="detail">
                <div class="dot blue"></div>
                <span>Previsão de retorno: em breve</span>
            </div>
        </div>

        <div class="footer">
            <span class="system-name">SISCONT</span> — Sistema de Gestão de Contratos
        </div>
    </div>
</body>
</html>
