server {
    listen 80;
    server_name localhost; # No servidor real, substituir pelo IP da OM

    # Usa o DNS interno do Docker para resolver nomes de containers dinamicamente.
    # Isso evita o erro 502 Bad Gateway quando o container web é recriado com um novo IP.
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 20M;

    # Página de manutenção (ativada quando /usr/share/nginx/html/maintenance.on existe)
    error_page 503 @maintenance;

    location @maintenance {
        root /usr/share/nginx/html;
        rewrite ^(.*)$ /maintenance.html break;
    }

    # Gestão de Ficheiros Estáticos (CSS, JS, Imagens)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Gestão de Media (Uploads)
    location /media/ {
        alias /app/mediafiles/;
        types { application/pdf pdf; }
        default_type application/octet-stream;
    }

    # Encaminhamento de Lógica para o Django
    location / {
        # Se o ficheiro-flag existir, retorna 503 (modo manutenção)
        if (-f /usr/share/nginx/html/maintenance.on) {
            return 503;
        }

        # A variável força o Nginx a re-resolver o DNS a cada requisição,
        # em vez de cachear o IP do container na inicialização.
        set $backend http://web:8000;
        proxy_pass $backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        # Garante que o header Content-Disposition seja encaminhado ao browser
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Type;
        proxy_pass_header Cache-Control;
    }
}
